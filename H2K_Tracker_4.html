<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#efefef;
  --text:#111111;--text2:#555555;--text3:#999999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --gold:#C8A96E;--teal:#1D9E75;--purple:#534AB7;--coral:#D85A30;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{padding:16px 20px 12px;border-bottom:0.5px solid var(--border)}
.header h1{font-size:18px;font-weight:600;color:var(--gold);letter-spacing:.02em}
.header p{font-size:12px;color:var(--text3);margin-top:2px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;background:var(--bg2);padding:4px;margin:16px 16px 0}
.tabs{border-radius:var(--radius)}
.tab{padding:10px 4px;font-size:13px;font-weight:500;border:none;background:transparent;border-radius:8px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--bg);color:var(--text);box-shadow:0 0 0 0.5px var(--border2)}
.pane{display:none;padding:16px}
.pane.active{display:block}
.section-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:16px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block}
.opener-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.opener-btn{padding:13px 8px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;text-align:center;transition:all .12s;-webkit-tap-highlight-color:transparent}
.opener-btn.sel{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
@media(prefers-color-scheme:dark){.opener-btn.sel{background:#26215C;border-color:#534AB7;color:#CECBF6}}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px}
.field input[type=number],.field input[type=text]{width:100%;padding:12px 14px;font-size:16px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);-webkit-appearance:none;appearance:none}
.field input:focus{outline:none;border-color:var(--gold)}
.save-btn{width:100%;padding:15px;border-radius:var(--radius-lg);border:none;background:var(--gold);color:#1a1100;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:transparent}
.save-btn:active{transform:scale(.98);opacity:.9}
.confirm{text-align:center;font-size:13px;color:var(--teal);margin-top:10px;height:18px}
.mrow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.met{background:var(--bg2);border-radius:var(--radius);padding:12px 8px;text-align:center}
.met-v{font-size:22px;font-weight:600;color:var(--text);display:block}
.met-l{font-size:10px;color:var(--text3);margin-top:2px;display:block}
.highlight-card{background:#EEEDFE;border:0.5px solid #AFA9EC;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
@media(prefers-color-scheme:dark){.highlight-card{background:#26215C;border-color:#534AB7}}
.hc-label{font-size:11px;font-weight:600;color:#534AB7;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
@media(prefers-color-scheme:dark){.hc-label{color:#AFA9EC}}
.hc-val{font-size:17px;font-weight:600;color:#26215C}
@media(prefers-color-scheme:dark){.hc-val{color:#CECBF6}}
.hc-sub{font-size:12px;color:#534AB7;margin-top:2px}
@media(prefers-color-scheme:dark){.hc-sub{color:#AFA9EC}}
.divider{height:0.5px;background:var(--border);margin:16px 0}
.week-entry{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.we-name{font-size:13px;font-weight:500;color:var(--text)}
.we-opener{font-size:11px;color:var(--text3);margin-top:2px}
.badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-teal{background:#E1F5EE;color:#085041}
.badge-purple{background:#EEEDFE;color:#3C3489}
@media(prefers-color-scheme:dark){
  .badge-amber{background:#412402;color:#FAC775}
  .badge-teal{background:#04342C;color:#9FE1CB}
  .badge-purple{background:#26215C;color:#CECBF6}
}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px}
.chart-wrap{margin-bottom:16px}
.chart-bar-row{margin-bottom:10px}
.chart-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between}
.chart-track{height:28px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative}
.chart-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:600;color:#fff;transition:width .4s ease;min-width:2px}
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:14px}
.type-btn{padding:11px 6px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.type-btn.sel{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
@media(prefers-color-scheme:dark){.type-btn.sel{background:#26215C;border-color:#534AB7;color:#CECBF6}}
.drove-row{display:flex;gap:8px;margin-bottom:14px}
.drove-btn{flex:1;padding:12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.drove-btn.sel-y{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.drove-btn.sel-n{background:#FCEBEB;border-color:#F09595;color:#791F1F}
@media(prefers-color-scheme:dark){
  .drove-btn.sel-y{background:#04342C;border-color:#1D9E75;color:#9FE1CB}
  .drove-btn.sel-n{background:#501313;border-color:#E24B4A;color:#F7C1C1}
}
.post-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.post-hook{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px}
.post-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px}
.stat-cell{text-align:center}
.stat-v{font-size:13px;font-weight:500;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3)}
.post-footer{display:flex;justify-content:space-between;align-items:center}
.inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
</style>
</head>
<body>

<div class="header">
  <h1>HARD TO KILL</h1>
  <p id="today-date"></p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">Daily log</button>
  <button class="tab" onclick="switchTab('week')">This week</button>
  <button class="tab" onclick="switchTab('content')">Content</button>
</div>

<div id="pane-log" class="pane active">
  <p class="section-title">End of day log</p>
  <p class="section-sub" id="log-date-sub"></p>

  <div class="card">
    <span class="lbl">Opener type today</span>
    <div class="opener-grid">
      <button class="opener-btn" onclick="selOpener(this,'new-follow')">New follow</button>
      <button class="opener-btn" onclick="selOpener(this,'engaged')">Engaged w/ content</button>
      <button class="opener-btn" onclick="selOpener(this,'compliment')">Profile compliment</button>
      <button class="opener-btn" onclick="selOpener(this,'mixed')">Mixed</button>
    </div>

    <div class="field"><label>DMs sent</label><input type="number" id="f-sent" min="0" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>Replies received</label><input type="number" id="f-replies" min="0" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>Convos that opened up</label><input type="number" id="f-convos" min="0" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>Calls booked</label><input type="number" id="f-booked" min="0" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>Calls completed</label><input type="number" id="f-completed" min="0" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>Closes</label><input type="number" id="f-closed" min="0" placeholder="0" inputmode="numeric"></div>
  </div>

  <button class="save-btn" onclick="saveDay()">Save today</button>
  <div class="confirm" id="log-confirm"></div>
</div>

<div id="pane-week" class="pane">
  <p class="section-title">This week</p>
  <p class="section-sub" id="week-range"></p>
  <div id="week-metrics"></div>
  <div id="week-chart"></div>
  <div id="week-opener"></div>
  <div class="divider"></div>
  <span class="lbl">Daily entries</span>
  <div id="week-entries"></div>
</div>

<div id="pane-content" class="pane">
  <p class="section-title">Log a post</p>
  <p class="section-sub">Pull numbers from Instagram dashboard</p>

  <div class="card">
    <span class="lbl">Content type</span>
    <div class="type-grid">
      <button class="type-btn" onclick="selType(this,'talking-head')">Talking head</button>
      <button class="type-btn" onclick="selType(this,'whiteboard')">Whiteboard</button>
      <button class="type-btn" onclick="selType(this,'carousel')">Carousel</button>
      <button class="type-btn" onclick="selType(this,'top-of-funnel')">Top of funnel</button>
      <button class="type-btn" onclick="selType(this,'story')">Story sequence</button>
      <button class="type-btn" onclick="selType(this,'tweet')">Tweet style</button>
    </div>

    <div class="field"><label>Hook / topic</label><input type="text" id="c-hook" placeholder="e.g. why ex-athletes lose their edge"></div>
      <div class="field"><label>Instagram post URL</label><input type="text" id="c-url" placeholder="https://instagram.com/p/..."></div>

    <div class="inputs-grid">
      <div class="field" style="margin:0"><label>Reach</label><input type="number" id="c-reach" min="0" placeholder="0" inputmode="numeric"></div>
      <div class="field" style="margin:0"><label>Likes</label><input type="number" id="c-likes" min="0" placeholder="0" inputmode="numeric"></div>
      <div class="field" style="margin:0"><label>Comments</label><input type="number" id="c-comments" min="0" placeholder="0" inputmode="numeric"></div>
      <div class="field" style="margin:0"><label>Saves</label><input type="number" id="c-saves" min="0" placeholder="0" inputmode="numeric"></div>
      <div class="field" style="margin:0"><label>Shares</label><input type="number" id="c-shares" min="0" placeholder="0" inputmode="numeric"></div>
    </div>
    <div style="margin-top:14px"></div>
    <span class="lbl">Drove DM conversations?</span>
    <div class="drove-row">
      <button class="drove-btn" id="drove-y" onclick="selDrove(true)">Yes</button>
      <button class="drove-btn" id="drove-n" onclick="selDrove(false)">No</button>
    </div>
  </div>

  <button class="save-btn" onclick="saveContent()">Save post</button>
  <div class="confirm" id="content-confirm"></div>

  <div class="divider"></div>
  <span class="lbl">Posts logged</span>
  <div id="content-list"></div>
</div>

<script>
var _opener=null,_type=null,_drove=null;
var OPENER_LABELS={'new-follow':'New follow','engaged':'Engaged w/ content','compliment':'Profile compliment','mixed':'Mixed'};
var TYPE_LABELS={'talking-head':'Talking head','whiteboard':'Whiteboard','carousel':'Carousel','top-of-funnel':'Top of funnel','story':'Story','tweet':'Tweet style'};
var BAR_COLORS=['#C8A96E','#1D9E75','#534AB7','#D85A30','#D4537E'];

function todayKey(){return new Date().toISOString().slice(0,10)}
function fmt(n){return Math.round(n)}
function pct(a,b){return b>0?Math.round(a/b*100)+'%':'—'}

function getDays(){try{return JSON.parse(localStorage.getItem('h2k_days')||'[]')}catch(e){return[]}}
function saveDays(a){try{localStorage.setItem('h2k_days',JSON.stringify(a))}catch(e){}}
function getPosts(){try{return JSON.parse(localStorage.getItem('h2k_posts')||'[]')}catch(e){return[]}}
function savePosts(a){try{localStorage.setItem('h2k_posts',JSON.stringify(a))}catch(e){}}

function switchTab(t){
  ['log','week','content'].forEach(function(n,i){
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===t);
    document.getElementById('pane-'+n).classList.toggle('active',n===t);
  });
  if(t==='week')renderWeek();
  if(t==='content')renderContent();
}

function selOpener(btn,val){
  document.querySelectorAll('.opener-btn').forEach(function(b){b.classList.remove('sel')});
  btn.classList.add('sel');_opener=val;
}
function selType(btn,val){
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('sel')});
  btn.classList.add('sel');_type=val;
}
function selDrove(val){
  _drove=val;
  document.getElementById('drove-y').className='drove-btn'+(val?' sel-y':'');
  document.getElementById('drove-n').className='drove-btn'+(!val?' sel-n':'');
}

function saveDay(){
  var d={
    date:todayKey(),opener:_opener,
    sent:parseInt(document.getElementById('f-sent').value)||0,
    replies:parseInt(document.getElementById('f-replies').value)||0,
    convos:parseInt(document.getElementById('f-convos').value)||0,
    booked:parseInt(document.getElementById('f-booked').value)||0,
    completed:parseInt(document.getElementById('f-completed').value)||0,
    closed:parseInt(document.getElementById('f-closed').value)||0
  };
  var days=getDays().filter(function(x){return x.date!==d.date});
  days.push(d);saveDays(days);
  ['f-sent','f-replies','f-convos','f-booked','f-completed','f-closed'].forEach(function(id){document.getElementById(id).value=''});
  document.querySelectorAll('.opener-btn').forEach(function(b){b.classList.remove('sel')});
  _opener=null;
  flash('log-confirm','Saved');
}

function saveContent(){
  var hook=document.getElementById('c-hook').value.trim();
  if(!hook||!_type){flash('content-confirm','Select a type and add a hook');return;}
  var posts=getPosts();
  posts.unshift({date:todayKey(),type:_type,hook:hook,url:document.getElementById('c-url').value.trim(),drove:_drove,
    reach:parseInt(document.getElementById('c-reach').value)||0,
    likes:parseInt(document.getElementById('c-likes').value)||0,
    comments:parseInt(document.getElementById('c-comments').value)||0,
    saves:parseInt(document.getElementById('c-saves').value)||0,
    shares:parseInt(document.getElementById('c-shares').value)||0
  });
  savePosts(posts);
  document.getElementById('c-hook').value='';
  ['c-reach','c-likes','c-comments','c-saves','c-shares','c-url'].forEach(function(id){document.getElementById(id).value=''});
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('sel')});
  document.getElementById('drove-y').className='drove-btn';
  document.getElementById('drove-n').className='drove-btn';
  _type=null;_drove=null;
  flash('content-confirm','Saved');
  renderContent();
}

function flash(id,msg){
  var el=document.getElementById(id);
  el.textContent=msg;
  setTimeout(function(){el.textContent=''},2500);
}

function getWeekKeys(){
  var now=new Date(),day=now.getDay();
  var mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));
  var keys=[];
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);keys.push(d.toISOString().slice(0,10));}
  return keys;
}

function renderWeek(){
  var keys=getWeekKeys();
  var days=getDays().filter(function(d){return keys.indexOf(d.date)>=0});
  var t={sent:0,replies:0,convos:0,booked:0,completed:0,closed:0};
  var opMap={};
  days.forEach(function(d){
    t.sent+=d.sent;t.replies+=d.replies;t.convos+=d.convos;
    t.booked+=d.booked;t.completed+=d.completed;t.closed+=d.closed;
    if(d.opener)opMap[d.opener]=(opMap[d.opener]||0)+d.replies;
  });

  document.getElementById('week-range').textContent=keys[0]+' — '+keys[6];

  document.getElementById('week-metrics').innerHTML=
    '<div class="mrow">'
    +'<div class="met"><span class="met-v">'+fmt(t.sent)+'</span><span class="met-l">DMs sent</span></div>'
    +'<div class="met"><span class="met-v">'+pct(t.replies,t.sent)+'</span><span class="met-l">Reply rate</span></div>'
    +'<div class="met"><span class="met-v">'+pct(t.booked,t.replies)+'</span><span class="met-l">Reply→call</span></div>'
    +'</div>'
    +'<div class="mrow">'
    +'<div class="met"><span class="met-v">'+fmt(t.booked)+'</span><span class="met-l">Calls booked</span></div>'
    +'<div class="met"><span class="met-v">'+pct(t.closed,t.completed)+'</span><span class="met-l">Close rate</span></div>'
    +'<div class="met"><span class="met-v">'+fmt(t.closed)+'</span><span class="met-l">Closes</span></div>'
    +'</div>';

  var funnel=[
    {label:'DMs sent',val:t.sent},
    {label:'Replies',val:t.replies},
    {label:'Convos opened',val:t.convos},
    {label:'Calls booked',val:t.booked},
    {label:'Closes',val:t.closed}
  ];
  var max=Math.max(1,t.sent);
  var chartHtml='<span class="lbl">Funnel this week</span><div class="chart-wrap">';
  funnel.forEach(function(item,i){
    var w=Math.max(2,Math.round(item.val/max*100));
    chartHtml+='<div class="chart-bar-row">'
      +'<div class="chart-label"><span>'+item.label+'</span><span style="font-weight:600;color:var(--text)">'+fmt(item.val)+'</span></div>'
      +'<div class="chart-track"><div class="chart-fill" style="width:'+w+'%;background:'+BAR_COLORS[i]+'"></div></div>'
      +'</div>';
  });
  chartHtml+='</div>';
  document.getElementById('week-chart').innerHTML=chartHtml;

  var bestOpener=Object.keys(opMap).sort(function(a,b){return opMap[b]-opMap[a]})[0];
  document.getElementById('week-opener').innerHTML=bestOpener
    ?'<div class="highlight-card"><div class="hc-label">Best opener this week</div><div class="hc-val">'+OPENER_LABELS[bestOpener]+'</div><div class="hc-sub">Most replies by opener type</div></div>':'' ;

  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var el=document.getElementById('week-entries');
  if(!days.length){el.innerHTML='<div class="empty">No entries this week yet</div>';return;}
  el.innerHTML=days.slice().reverse().map(function(d){
    var dt=new Date(d.date+'T12:00:00');
    var label=dayNames[dt.getDay()]+' '+d.date.slice(5);
    return '<div class="week-entry">'
      +'<div><div class="we-name">'+label+'</div><div class="we-opener">'+(d.opener?OPENER_LABELS[d.opener]:'No opener logged')+'</div></div>'
      +'<div class="badges">'
      +'<span class="badge badge-amber">'+d.sent+' sent</span>'
      +'<span class="badge badge-teal">'+d.replies+' replied</span>'
      +(d.closed>0?'<span class="badge badge-purple">'+d.closed+' closed</span>':'')
      +'</div></div>';
  }).join('');
}

function renderContent(){
  var posts=getPosts();
  var el=document.getElementById('content-list');
  if(!posts.length){el.innerHTML='<div class="empty">No posts logged yet</div>';return;}
  el.innerHTML=posts.slice(0,15).map(function(p){
    return '<div class="post-card">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      +'<div style="flex:1;padding-right:8px"><div class="post-hook" style="margin:0">'+p.hook+'</div>'+(p.url?'<a href="'+p.url+'" target="_blank" style="font-size:12px;color:#C8A96E;text-decoration:none">View post ↗</a>':'')+'</div>'
      +'<span class="badge badge-purple" style="white-space:nowrap;flex-shrink:0">'+(TYPE_LABELS[p.type]||p.type)+'</span>'
      +'</div>'
      +'<div class="post-stats">'
      +'<div class="stat-cell"><div class="stat-v">'+fmt(p.reach)+'</div><div class="stat-l">reach</div></div>'
      +'<div class="stat-cell"><div class="stat-v">'+fmt(p.likes)+'</div><div class="stat-l">likes</div></div>'
      +'<div class="stat-cell"><div class="stat-v">'+fmt(p.comments)+'</div><div class="stat-l">comments</div></div>'
      +'<div class="stat-cell"><div class="stat-v">'+fmt(p.saves)+'</div><div class="stat-l">saves</div></div>'
      +'<div class="stat-cell"><div class="stat-v">'+fmt(p.shares)+'</div><div class="stat-l">shares</div></div>'
      +'</div>'
      +'<div class="post-footer">'
      +'<span style="font-size:11px;color:var(--text3)">'+p.date+'</span>'
      +(p.drove===true?'<span class="badge badge-teal">drove DMs</span>':p.drove===false?'<span class="badge badge-amber">no DMs</span>':'')
      +'</div></div>';
  }).join('');
}

var now=new Date();
var opts={weekday:'long',month:'long',day:'numeric'};
document.getElementById('today-date').textContent=now.toLocaleDateString('en-US',opts);
document.getElementById('log-date-sub').textContent=now.toLocaleDateString('en-US',opts);
</script>
</body>
</html>
